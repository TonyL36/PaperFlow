server:
  port: 8082
  servlet:
    context-path: /api/v1
  tomcat:
    relaxed-query-chars: ['[', ']']

spring:
  application:
    name: content-service
  datasource:
    url: ${CONTENT_DB_URL:jdbc:h2:file:./.dev/h2/contentdb;MODE=PostgreSQL;AUTO_SERVER=TRUE}
    username: ${CONTENT_DB_USER:sa}
    password: ${CONTENT_DB_PASS:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

paperflow:
  pathfinder:
    ai:
      endpoint: ${PF_PATHFINDER_AI_ENDPOINT:https://open.bigmodel.cn/api/paas/v4/chat/completions}
      apiKey: ${PF_PATHFINDER_AI_API_KEY:}
      apiKeyPairs: ${PF_PATHFINDER_AI_KEY_PAIRS:}
      timeoutMillis: ${PF_PATHFINDER_AI_TIMEOUT_MS:25000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
